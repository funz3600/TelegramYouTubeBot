<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fun size Community</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: #eee;
            margin: 0;
            padding: 16px;
        }
        h2 {
            text-align: center;
            color: #e94560;
        }
        .channel-card {
            background: #16213e;
            border-radius: 12px;
            padding: 14px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .channel-name {
            font-size: 16px;
            flex: 1;
        }
        button {
            background: #e94560;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
        }
        button:active { opacity: 0.8; }
        button.subscribed {
            background: #0f3460;
        }
    </style>
</head>
<body>
    <h2>🔥 Fun size Community Hub</h2>
    <div id="channel-list">Loading...</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // This URL returns JSON with all connected channels
        const API = '/api/channels';

        async function fetchChannels() {
            try {
                const res = await fetch(API);
                const channels = await res.json();
                render(channels);
            } catch(e) {
                document.getElementById('channel-list').innerText = 'Failed to load channels.';
            }
        }

        function render(channels) {
            let html = '';
            channels.forEach(ch => {
                html += `
                    <div class="channel-card">
                        <span class="channel-name">${ch.title}</span>
                        <button class="${ch.subscribed ? 'subscribed' : ''}"
                                onclick="subscribe('${ch.id}')">
                            ${ch.subscribed ? '✓ Subscribed' : 'Subscribe'}
                        </button>
                    </div>
                `;
            });
            document.getElementById('channel-list').innerHTML = html || 'No channels yet.';
        }

        async function subscribe(channelId) {
            tg.showConfirm(`Subscribe to this channel?`, (confirmed) => {
                if (confirmed) {
                    // Send data back to the bot via Telegram WebApp
                    tg.sendData(`sub_${channelId}`);
                    // Optimistic UI update (button will reflect after actual bot callback fires)
                    // For now we can just show a brief feedback
                    tg.showAlert('Subscription request sent!');
                }
            });
        }

        fetchChannels();
    </script>
</body>
</html>
